<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neuroscience Quiz Engine</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #38bdf8; --text: #f1f5f9; --muted: #94a3b8; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 800px; margin: 40px auto; background: var(--card); padding: 40px; border-radius: 24px; border: 1px solid #334155; }
        .search-container { background: #0f172a; border-radius: 16px; padding: 25px; border: 1px solid #334155; margin: 20px 0; }
        input { width: 100%; background: transparent; border: none; color: white; font-size: 1.1rem; outline: none; margin: 10px 0; border-bottom: 2px solid #334155; padding-bottom: 5px; }
        input:focus { border-color: var(--primary); }
        .chip { display: inline-block; background: #334155; padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; margin: 4px; transition: 0.2s; border: 1px solid transparent; }
        .chip:hover { border-color: var(--primary); background: #1e293b; }
        .hidden { display: none; }
        .option { background: #334155; padding: 18px; border-radius: 12px; margin-bottom: 12px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .option:hover { background: #475569; }
        .option.selected { border-color: var(--primary); background: #0f172a; }
        button { background: var(--primary); color: #0f172a; border: none; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1rem; }
        .explanation-card { background: #0f172a; padding: 20px; border-radius: 12px; margin-top: 15px; border-left: 5px solid var(--primary); }
        #progress-bar { height: 6px; background: #334155; border-radius: 3px; margin-bottom: 20px; }
        #progress-fill { height: 100%; background: var(--primary); width: 0%; border-radius: 3px; transition: width 0.3s; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-screen">
        <h1 style="margin:0;">Neuroscience Quiz Engine</h1>
        <p style="color:var(--muted); margin-bottom:30px;">Science Olympiad 2026 Division B</p>
        
        <div class="search-container">
            <label style="font-size: 0.8rem; color: var(--primary); font-weight: bold; letter-spacing: 1px;">INTENT ROUTER</label>
            <input type="text" id="ai-input" placeholder='e.g. "10 questions on endocrine" or "quiz me on vision"'>
            <button onclick="processRequest()">Generate Quiz</button>
        </div>

        <div id="quick-topics">
            <p style="font-size: 0.75rem; color: var(--muted); font-weight: bold; margin-bottom:10px;">POPULAR TOPICS</p>
            <div id="topic-chips"></div>
        </div>
    </div>

    <div id="quiz-screen" class="hidden">
        <div id="progress-bar"><div id="progress-fill"></div></div>
        <div id="progress-text" style="font-size: 0.8rem; color: var(--muted); margin-bottom: 15px;"></div>
        <h2 id="q-text" style="font-size: 1.3rem; margin-bottom: 25px;"></h2>
        <div id="options-container"></div>
        <button id="next-btn" class="hidden" onclick="handleNext()">Confirm Answer</button>
    </div>

    <div id="results-screen" class="hidden">
        <h2 style="text-align:center;">Quiz Review</h2>
        <div id="final-score" style="text-align:center; font-size: 2rem; margin-bottom: 30px;"></div>
        <div id="review-area"></div>
        <button onclick="location.reload()">New Quiz</button>
    </div>
</div>

<script>
    let allQuestions = [];
    let activeQuestions = [];
    let currentIdx = 0;
    let userAnswers = [];

    async function init() {
        try {
            const response = await fetch('state-test-bank.md');
            const text = await response.text();
            parseMD(text);
            generateChips();
        } catch (e) {
            console.error("Failed to load question bank.");
        }
    }

    function parseMD(text) {
        const sections = text.split(/##\s+/).filter(s => s.trim());
        sections.forEach(section => {
            const lines = section.split('\n');
            const topic = lines[0].trim();
            const qBlocks = section.split(/\n\d+\.\s+/).slice(1);
            qBlocks.forEach(block => {
                const parts = block.split(/\n\s*[A-D]\.\s/);
                if (parts.length < 5) return;
                const answerMatch = block.match(/Answer:\s*([A-D])/i);
                const explMatch = block.match(/Explanation:\s*([\s\S]*)$/i);
                if (answerMatch) {
                    allQuestions.push({
                        topic: topic,
                        question: parts[0].trim(),
                        options: parts.slice(1, 5).map(o => o.split(/\n(Answer|Explanation):/i)[0].trim()),
                        answer: answerMatch[1].toUpperCase(),
                        explanation: explMatch ? explMatch[1].trim() : "Standard competition logic applies."
                    });
                }
            });
        });
    }

    function generateChips() {
        const topics = [...new Set(allQuestions.map(q => q.topic))];
        const container = document.getElementById('topic-chips');
        topics.forEach(t => {
            const chip = document.createElement('div');
            chip.className = 'chip';
            chip.innerText = t;
            chip.onclick
