<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Quiz Engine</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; line-height: 1.6; }
        .container { max-width: 850px; margin: 0 auto; background: var(--card); padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { color: var(--primary); text-align: center; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #64748b; margin-bottom: 30px; font-size: 0.9em; }
        .setup-group { margin-bottom: 25px; }
        label { font-weight: 600; display: block; margin-bottom: 8px; }
        select, input, button { width: 100%; padding: 14px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; transition: transform 0.1s; }
        button:active { transform: scale(0.98); }
        .hidden { display: none; }
        .option { display: block; padding: 16px; border: 2px solid #e2e8f0; margin-bottom: 12px; border-radius: 10px; cursor: pointer; transition: all 0.2s; }
        .option:hover { border-color: var(--primary); background: #eff6ff; }
        .option.selected { border-color: var(--primary); background: #dbeafe; font-weight: 600; }
        .explanation-card { background: #f8fafc; padding: 20px; border-radius: 12px; margin-bottom: 25px; border-left: 6px solid #cbd5e1; }
        .explanation-card.is-correct { border-left-color: #16a34a; }
        .explanation-card.is-incorrect { border-left-color: #dc2626; }
        .result-tag { display: inline-block; padding: 4px 12px; border-radius: 4px; font-size: 0.8em; font-weight: bold; margin-bottom: 10px; }
        .tag-correct { background: #dcfce7; color: #16a34a; }
        .tag-incorrect { background: #fee2e2; color: #dc2626; }
        #progress-bar { height: 8px; background: #e2e8f0; border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
        #progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s; }
    </style>
</head>
<body>

<div class="container">
    <h1>Quiz Engine</h1>
    <p class="subtitle">AnatomyQuiz System</p>
    
    <div id="setup-screen">
        <p id="status-msg" style="text-align:center;">Loading Question Bank...</p>
        <div id="controls" class="hidden">
            <div class="setup-group">
                <label>Choose Topic</label>
                <select id="topic-select"></select>
            </div>
            <div class="setup-group">
                <label>Number of Questions</label>
                <input type="number" id="q-count" value="10" min="1">
            </div>
            <button onclick="startQuiz()">Generate Quiz</button>
        </div>
    </div>

    <div id="quiz-screen" class="hidden">
        <div id="progress-bar"><div id="progress-fill"></div></div>
        <div id="progress-text" style="font-weight: bold; color: var(--primary); margin-bottom: 10px;"></div>
        <div id="question-container">
            <h3 id="q-text" style="margin-top: 0;"></h3>
            <div id="options-container"></div>
        </div>
        <button id="next-btn" class="hidden" onclick="nextQuestion()">Confirm & Next</button>
    </div>

    <div id="results-screen" class="hidden">
        <h2 style="text-align:center;">Quiz Results</h2>
        <div id="score-circle" style="text-align:center; font-size: 2em; font-weight: bold; margin-bottom: 20px; color: var(--primary);"></div>
        <div id="review-area"></div>
        <button onclick="location.reload()">Take Another Quiz</button>
    </div>
</div>

<script>
    let allQuestions = [];
    let activeQuestions = [];
    let currentIdx = 0;
    let userAnswers = [];

    async function loadQuestions() {
        try {
            // Updated to use the specific filename you provided
            const response = await fetch('state-test-bank.md');
            if (!response.ok) throw new Error("Could not find state-test-bank.md");
            const text = await response.text();
            parseMarkdown(text);
            
            if(allQuestions.length === 0) {
                document.getElementById('status-msg').innerText = "Error: File loaded but no questions were found. Check formatting.";
                return;
            }

            const topics = [...new Set(allQuestions.map(q => q.topic))];
            const select = document.getElementById('topic-select');
            select.innerHTML = '<option value="all">All Topics (Shuffle)</option>' + 
                topics.map(t => `<option value="${t}">${t}</option>`).join('');
            
            document.getElementById('status-msg').classList.add('hidden');
            document.getElementById('controls').classList.remove('hidden');
        } catch (err) {
            document.getElementById('status-msg').innerHTML = "<b>Error:</b> File 'state-test-bank.md' not found in repo.<br>Ensure you uploaded it to the same folder as this index.html.";
        }
    }

    function parseMarkdown(text) {
        // Split by ## Topic
        const sections = text.split(/##\s+/).filter(s => s.trim());
        
        sections.forEach(section => {
            const lines = section.split('\n');
            const topic = lines[0].trim();
            // Split by "1. ", "2. ", etc.
            const qBlocks = section.split(/\n\d+\.\s+/).slice(1);
            
            qBlocks.forEach(block => {
                const parts = block.split(/\n\s*[A-D]\.\s/);
                if (parts.length < 5) return;

                const questionText = parts[0].trim();
                const options = parts.slice(1, 5).map(o => o.split(/\n(Answer|Explanation):/i)[0].trim());
                const answer = block.match(/Answer:\s*([A-D])/i)?.[1];
                const explanation = block.match(/Explanation:\s*([\s\S]*)$/i)?.[1] || "No detailed explanation provided.";

                if (answer) {
                    allQuestions.push({ topic, question: questionText, options, answer, explanation });
                }
            });
        });
    }

    function startQuiz() {
        const topic = document.getElementById('topic-select').value;
        const countInput = document.getElementById('q-count');
        let count = parseInt(countInput.value);
        
        let filtered = topic === 'all' ? [...allQuestions] : allQuestions.filter(q => q.topic === topic);
        if (count > filtered.length) count = filtered.length;
        
        activeQuestions = filtered.sort(() => 0.5 - Math.random()).slice(0, count);
        
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const q = activeQuestions[currentIdx];
        const progressPct = ((currentIdx) / activeQuestions.length) * 100;
        
        document.getElementById('progress-fill').style.width = `${progressPct}%`;
        document.getElementById('progress-text').innerText = `Question ${currentIdx + 1} of ${activeQuestions.length}`;
        document.getElementById('q-text').innerText = q.question;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        document.getElementById('next-btn').classList.add('hidden');

        ['A','B','C','D'].forEach((letter, i) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerText = `${letter}. ${q.options[i]}`;
            div.onclick = () => {
                document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                div.classList.add('selected');
                userAnswers[currentIdx] = letter;
                document.getElementById('next-btn').classList.remove('hidden');
            };
            container.appendChild(div);
        });
    }

    function nextQuestion() {
        if (currentIdx < activeQuestions.length - 1) {
            currentIdx++;
            showQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('results-screen').classList.remove('hidden');
        
        let score = 0;
        let html = '';
        activeQuestions.forEach((q, i) => {
            const isCorrect = userAnswers[i] === q.answer;
            if (isCorrect) score++;
            
            html += `
                <div class="explanation-card ${isCorrect ? 'is-correct' : 'is-incorrect'}">
                    <span class="result-tag ${isCorrect ? 'tag-correct' : 'tag-incorrect'}">
                        ${isCorrect ? 'CORRECT' : 'INCORRECT'}
                    </span>
                    <p><strong>Q${i+1}:</strong> ${q.question}</p>
                    <p>Your Answer: <b>${userAnswers[i]}</b> | Correct Answer: <b>${q.answer}</b></p>
                    <p style="font-size: 0.9em; color: #475569; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #cbd5e1;">
                        <i>${q.explanation}</i>
                    </p>
                </div>
            `;
        });

        document.getElementById('score-circle').innerText = `${score} / ${activeQuestions.length}`;
        document.getElementById('review-area').innerHTML = html;
    }

    loadQuestions();
</script>
</body>
</html>
