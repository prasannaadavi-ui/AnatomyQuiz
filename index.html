<!DOCTYPE html><html lang="en"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <title>PMP Question Bank Engine</title>    <style>        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; }        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: #1e293b; line-height: 1.6; padding: 20px; }        .container { max-width: 800px; margin: 0 auto; background: var(--card); padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }        h1 { color: var(--primary); text-align: center; }        .setup-group { margin-bottom: 20px; }        select, input, button { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 16px; }        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: 600; transition: opacity 0.2s; }        button:hover { opacity: 0.9; }        .hidden { display: none; }        .question-meta { font-size: 0.9em; color: #64748b; margin-bottom: 10px; }        .option { display: block; padding: 15px; border: 2px solid #e2e8f0; margin-bottom: 10px; border-radius: 8px; cursor: pointer; }        .option:hover { border-color: var(--primary); background: #eff6ff; }        .option.selected { border-color: var(--primary); background: #dbeafe; }        .explanation { background: #f1f5f9; padding: 15px; border-radius: 8px; margin-top: 20px; border-left: 4px solid var(--primary); }        .correct { color: #16a34a; font-weight: bold; }        .incorrect { color: #dc2626; font-weight: bold; }        #progress { margin-bottom: 20px; font-weight: bold; }    </style></head><body><div class="container">    <h1>Quiz Engine</h1>        <div id="setup-screen">        <p>Loading question bank...</p>        <div id="controls" class="hidden">            <div class="setup-group">                <label>Select Topic:</label>                <select id="topic-select"></select>            </div>            <div class="setup-group">                <label>Number of Questions:</label>                <input type="number" id="q-count" value="5" min="1">            </div>            <button onclick="startQuiz()">Start Quiz</button>        </div>    </div>    <div id="quiz-screen" class="hidden">        <div id="progress">Question 1 of X</div>        <div id="question-container">            <div class="question-meta" id="q-topic"></div>            <h3 id="q-text"></h3>            <div id="options-container"></div>        </div>        <button id="next-btn" class="hidden" onclick="nextQuestion()" style="margin-top: 20px;">Next Question</button>    </div>    <div id="results-screen" class="hidden">        <h2>Quiz Complete!</h2>        <p id="final-score" style="font-size: 1.5em;"></p>        <div id="review-area"></div>        <button onclick="location.reload()">Start New Quiz</button>    </div></div><script>    let allQuestions = [];    let activeQuestions = [];    let currentIdx = 0;    let score = 0;    let userAnswers = [];    const GIST_URL = 'https://gist.githubusercontent.com/prasannaadavi-ui/521817e7f478431c750c27bcdd93df80/raw/e74e32b42a47cd209da7a2dc4520929cdd0e3d9b/gistfile1.txt';    // Fetch and Parse Markdown    async function init() {        try {            const response = await fetch(GIST_URL);            const text = await response.text();            parseMD(text);                        const topics = [...new Set(allQuestions.map(q => q.topic))];            const select = document.getElementById('topic-select');            select.innerHTML = '<option value="all">All Topics</option>' +                 topics.map(t => `<option value="${t}">${t}</option>`).join('');                        document.getElementById('setup-screen').querySelector('p').classList.add('hidden');            document.getElementById('controls').classList.remove('hidden');        } catch (e) {            alert("Error loading questions. Please check the Gist URL.");        }    }    function parseMD(text) {        const sections = text.split(/##\s+/).slice(1);        sections.forEach(section => {            const lines = section.split('\n');            const topic = lines[0].trim();            const qBlocks = section.split(/\n\d+\.\s+/).slice(1);                        qBlocks.forEach(block => {                const parts = block.split(/\n\s*[A-D]\.\s/);                const questionText = parts[0].trim();                const options = parts.slice(1, 5).map(o => o.trim());                                const answerMatch = block.match(/Answer:\s*([A-D])/i);                const explanationMatch = block.match(/Explanation:\s*([\s\S]*)$/i);                if (answerMatch) {                    allQuestions.push({                        topic,                        question: questionText,                        options: options.map((opt, i) => ({ letter: String.fromCharCode(65+i), text: opt })),                        answer: answerMatch[1].toUpperCase(),                        explanation: explanationMatch ? explanationMatch[1].trim() : "No explanation provided."                    });                }            });        });    }    function startQuiz() {        const topic = document.getElementById('topic-select').value;        const count = parseInt(document.getElementById('q-count').value);                let filtered = topic === 'all' ? [...allQuestions] : allQuestions.filter(q => q.topic === topic);        activeQuestions = filtered.sort(() => 0.5 - Math.random()).slice(0, count);                document.getElementById('setup-screen').classList.add('hidden');        document.getElementById('quiz-screen').classList.remove('hidden');        showQuestion();    }    function showQuestion() {        const q = activeQuestions[currentIdx];        document.getElementById('progress').innerText = `Question ${currentIdx + 1} of ${activeQuestions.length}`;        document.getElementById('q-topic').innerText = `Topic: ${q.topic}`;        document.getElementById('q-text').innerText = q.question;                const container = document.getElementById('options-container');        container.innerHTML = '';        document.getElementById('next-btn').classList.add('hidden');        q.options.forEach(opt => {            const div = document.createElement('div');            div.className = 'option';            div.innerText = `${opt.letter}. ${opt.text}`;            div.onclick = () => selectOption(div, opt.letter);            container.appendChild(div);        });    }    function selectOption(el, letter) {        document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));        el.classList.add('selected');        userAnswers[currentIdx] = letter;        document.getElementById('next-btn').classList.remove('hidden');    }    function nextQuestion() {        if (currentIdx < activeQuestions.length - 1) {            currentIdx++;            showQuestion();        } else {            showResults();        }    }    function showResults() {        document.getElementById('quiz-screen').classList.add('hidden');        document.getElementById('results-screen').classList.remove('hidden');                let score = 0;        let reviewHTML = '';        activeQuestions.forEach((q, i) => {            const isCorrect = userAnswers[i] === q.answer;            if (isCorrect) score++;                        reviewHTML += `                <div class="explanation">                    <p><strong>Q${i+1}: ${q.question}</strong></p>                    <p>Your Answer: <span class="${isCorrect ? 'correct' : 'incorrect'}">${userAnswers[i]}</span></p>                    <p>Correct Answer: <span class="correct">${q.answer}</span></p>                    <p><em>${q.explanation}</em></p>                </div>            `;        });        document.getElementById('final-score').innerText = `Your Score: ${score} / ${activeQuestions.length}`;        document.getElementById('review-area').innerHTML = reviewHTML;    }    init();</script></body></html>
