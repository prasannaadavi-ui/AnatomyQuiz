<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Engine</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); padding: 20px; color: #1e293b; }
        .container { max-width: 800px; margin: 0 auto; background: var(--card); padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: var(--primary); }
        .setup-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        select, input, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 16px; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .hidden { display: none; }
        .option { display: block; padding: 15px; border: 2px solid #e2e8f0; margin-bottom: 10px; border-radius: 8px; cursor: pointer; }
        .option.selected { border-color: var(--primary); background: #eff6ff; }
        .explanation { background: #f1f5f9; padding: 15px; border-radius: 8px; border-left: 5px solid var(--primary); margin-bottom: 20px; }
        #debug-log { background: #fee2e2; color: #991b1b; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Quiz Engine</h1>
    
    <div id="setup-screen">
        <p id="loading-status">Checking for state-test-bank.md...</p>
        <div id="controls" class="hidden">
            <div class="setup-group">
                <label>Select Topic:</label>
                <select id="topic-select"></select>
            </div>
            <div class="setup-group">
                <label>How many questions?</label>
                <input type="number" id="q-count" value="5">
            </div>
            <button onclick="startQuiz()">Start Quiz</button>
        </div>
        <div id="debug-log" class="hidden"></div>
    </div>

    <div id="quiz-screen" class="hidden">
        <div id="progress" style="font-weight: bold; color: var(--primary); margin-bottom: 10px;"></div>
        <h3 id="q-text"></h3>
        <div id="options-container"></div>
        <button id="next-btn" class="hidden" onclick="nextQuestion()">Next Question</button>
    </div>

    <div id="results-screen" class="hidden">
        <h2>Results</h2>
        <div id="final-score" style="font-size: 24px; font-weight: bold; margin-bottom: 20px;"></div>
        <div id="review-area"></div>
        <button onclick="location.reload()">Restart</button>
    </div>
</div>

<script>
    let allQuestions = [];
    let activeQuestions = [];
    let currentIdx = 0;
    let userAnswers = [];

    // 1. Fetch the file
    async function init() {
        const log = document.getElementById('debug-log');
        try {
            const response = await fetch('state-test-bank.md');
            if (!response.ok) throw new Error("Could not find state-test-bank.md in this folder.");
            const text = await response.text();
            
            parseMarkdown(text);

            if (allQuestions.length === 0) {
                log.classList.remove('hidden');
                log.innerText = "Found file, but 0 questions parsed. Ensure questions are formatted as: \n1. Question \nA. Opt \nAnswer: A";
                return;
            }

            // Populate UI
            const topics = [...new Set(allQuestions.map(q => q.topic))];
            const select = document.getElementById('topic-select');
            select.innerHTML = '<option value="all">All Topics</option>' + 
                topics.map(t => `<option value="${t}">${t}</option>`).join('');
            
            document.getElementById('loading-status').classList.add('hidden');
            document.getElementById('controls').classList.remove('hidden');

        } catch (err) {
            log.classList.remove('hidden');
            log.innerText = "Error: " + err.message;
        }
    }

    // 2. Robust Parser
    function parseMarkdown(text) {
        // Split by Topic Headers (##)
        const sections = text.split(/##\s+/).filter(s => s.trim());
        
        sections.forEach(section => {
            const lines = section.split('\n');
            const topic = lines[0].trim();
            
            // Regex to find: Numbered question, 4 Options, and Answer
            const questionRegex = /(\d+\.[\s\S]+?)(?=Answer:)/gi;
            const matches = section.matchAll(questionRegex);

            for (const match of matches) {
                const block = match[0];
                const fullBlock = section.substring(match.index); // Include the Answer part
                
                // Extract parts
                const qText = block.split(/\n\s*[A-D]\.\s/)[0].replace(/^\d+\.\s*/, "").trim();
                const options = block.split(/\n\s*[A-D]\.\s/).slice(1, 5).map(o => o.trim());
                const ansMatch = fullBlock.match(/Answer:\s*([A-D])/i);
                const explMatch = fullBlock.match(/Explanation:\s*([\s\S]+?)(?=\n\d+\.|$)/i);

                if (ansMatch && options.length >= 4) {
                    allQuestions.push({
                        topic,
                        question: qText,
                        options,
                        answer: ansMatch[1].toUpperCase(),
                        explanation: explMatch ? explMatch[1].trim() : "Correct answer confirmed."
                    });
                }
            }
        });
    }

    function startQuiz() {
        const topic = document.getElementById('topic-select').value;
        const count = parseInt(document.getElementById('q-count').value);
        let filtered = topic === 'all' ? allQuestions : allQuestions.filter(q => q.topic === topic);
        activeQuestions = filtered.sort(() => 0.5 - Math.random()).slice(0, count);
        
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const q = activeQuestions[currentIdx];
        document.getElementById('progress').innerText = `Question ${currentIdx + 1} of ${activeQuestions.length}`;
        document.getElementById('q-text').innerText = q.question;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        document.getElementById('next-btn').classList.add('hidden');

        ['A','B','C','D'].forEach((letter, i) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerText = `${letter}. ${q.options[i]}`;
            div.onclick = () => {
                document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                div.classList.add('selected');
                userAnswers[currentIdx] = letter;
                document.getElementById('next-btn').classList.remove('hidden');
            };
            container.appendChild(div);
        });
    }

    function nextQuestion() {
        if (currentIdx < activeQuestions.length - 1) {
            currentIdx++;
            showQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('results-screen').classList.remove('hidden');
        let score = 0;
        let html = '';
        activeQuestions.forEach((q, i) => {
            const correct = userAnswers[i] === q.answer;
            if (correct) score++;
            html += `<div class="explanation">
                <strong>Q${i+1}: ${q.question}</strong><br>
                Your Answer: <span style="color:${correct?'green':'red'}">${userAnswers[i]}</span> | 
                Correct: <span style="color:green">${q.answer}</span><br>
                <p><em>${q.explanation}</em></p>
            </div>`;
        });
        document.getElementById('final-score').innerText = `Total Score: ${score} / ${activeQuestions.length}`;
        document.getElementById('review-area').innerHTML = html;
    }

    init();
</script>

</body>
</html>
