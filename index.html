<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neuroscience Quiz Engine</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #38bdf8; --text: #f1f5f9; --muted: #94a3b8; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 900px; background: var(--card); padding: 40px; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 1px solid #334155; }
        h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 2rem; display: flex; align-items: center; gap: 10px; }
        .search-container { position: relative; background: #0f172a; border-radius: 16px; padding: 20px; border: 1px solid #334155; }
        input { width: 100%; background: transparent; border: none; color: white; font-size: 1.2rem; outline: none; padding: 10px 0; }
        .prompt-label { color: var(--muted); font-size: 0.9rem; margin-bottom: 10px; display: block; }
        .quick-topics { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 30px; }
        .chip { background: #334155; padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .chip:hover { background: #475569; border-color: var(--primary); }
        .hidden { display: none; }
        .option { background: #334155; padding: 15px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; border: 2px solid transparent; }
        .option.selected { border-color: var(--primary); background: #1e293b; }
        button { background: var(--primary); color: #0f172a; border: none; padding: 12px 24px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 20px; }
        .explanation-card { background: #0f172a; padding: 20px; border-radius: 12px; margin-top: 15px; border-left: 4px solid var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-screen">
        <h1><span>🧠</span> Neuroscience Quiz Engine</h1>
        
        <div class="search-container">
            <span class="prompt-label">What do you want to study?</span>
            <input type="text" id="ai-input" placeholder='e.g. "10 questions on visual pathways" or "quiz me on everything"'>
            <button onclick="processAIInput()">Generate Quiz</button>
        </div>

        <div style="margin-top: 30px;">
            <span class="prompt-label">QUICK TOPICS</span>
            <div class="quick-topics" id="topic-chips">
                </div>
        </div>
    </div>

    <div id="quiz-screen" class="hidden">
        <div id="progress" style="color: var(--primary); margin-bottom: 15px; font-weight: bold;"></div>
        <h2 id="q-text"></h2>
        <div id="options-container"></div>
        <button id="next-btn" class="hidden" onclick="nextQuestion()">Confirm & Next</button>
    </div>

    <div id="results-screen" class="hidden">
        <h2>Quiz Results</h2>
        <div id="review-area"></div>
        <button onclick="location.reload()">Start New Session</button>
    </div>
</div>

<script>
    let allQuestions = [];
    let activeQuestions = [];
    let currentIdx = 0;
    let userAnswers = [];

    async function init() {
        const response = await fetch('state-test-bank.md');
        const text = await response.text();
        parseMD(text);
        renderChips();
    }

    function parseMD(text) {
        const sections = text.split(/##\s+/).filter(s => s.trim());
        sections.forEach(section => {
            const lines = section.split('\n');
            const topic = lines[0].trim();
            const qBlocks = section.split(/\n\d+\.\s+/).slice(1);
            qBlocks.forEach(block => {
                const parts = block.split(/\n\s*[A-D]\.\s/);
                if (parts.length < 5) return;
                const answer = block.match(/Answer:\s*([A-D])/i)?.[1];
                const explanation = block.match(/Explanation:\s*([\s\S]*)$/i)?.[1] || "No explanation.";
                allQuestions.push({
                    topic: topic.toLowerCase(),
                    displayTopic: topic,
                    question: parts[0].trim(),
                    options: parts.slice(1, 5).map(o => o.split(/\n(Answer|Explanation):/i)[0].trim()),
                    answer,
                    explanation
                });
            });
        });
    }

    function renderChips() {
        const topics = [...new Set(allQuestions.map(q => q.displayTopic))];
        const container = document.getElementById('topic-chips');
        topics.forEach(t => {
            const chip = document.createElement('div');
            chip.className = 'chip';
            chip.innerText = t;
            chip.onclick = () => { document.getElementById('ai-input').value = `10 questions on ${t}`; };
            container.appendChild(chip);
        });
    }

    function processAIInput() {
        const input = document.getElementById('ai-input').value.toLowerCase();
        
        // 1. Extract Number
        const numMatch = input.match(/\d+/);
        const count = numMatch ? parseInt(numMatch[0]) : 5;

        // 2. Filter by Keyword
        let filtered = allQuestions.filter(q => {
            if (input.includes('everything') || input.includes('mixed')) return true;
            return input.includes(q.topic) || q.question.toLowerCase().includes(input.split(' ').pop());
        });

        if (filtered.length === 0) filtered = allQuestions; // Fallback

        activeQuestions = filtered.sort(() => 0.5 - Math.random()).slice(0, count);
        
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const q = activeQuestions[currentIdx];
        document.getElementById('progress').innerText = `QUESTION ${currentIdx + 1} OF ${activeQuestions.length}`;
        document.getElementById('q-text').innerText = q.question;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        document.getElementById('next-btn').classList.add('hidden');

        ['A','B','C','D'].forEach((letter, i) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerText = `${letter}. ${q.options[i]}`;
            div.onclick = () => {
                document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                div.classList.add('selected');
                userAnswers[currentIdx] = letter;
                document.getElementById('next-btn').classList.remove('hidden');
            };
            container.appendChild(div);
        });
    }

    function nextQuestion() {
        if (currentIdx < activeQuestions.length - 1) {
            currentIdx++;
            showQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('results-screen').classList.remove('hidden');
        let html = '';
        activeQuestions.forEach((q, i) => {
            const isCorrect = userAnswers[i] === q.answer;
            html += `<div class="explanation-card">
                <p><strong>Q${i+1}: ${q.question}</strong></p>
                <p>Result: <span style="color:${isCorrect?'#4ade80':'#fb7185'}">${isCorrect?'Correct':'Incorrect'}</span></p>
                <p>Correct: ${q.answer}</p>
                <p><em>${q.explanation}</em></p>
            </div>`;
        });
        document.getElementById('review-area').innerHTML = html;
    }

    init();
</script>
</body>
</html>
