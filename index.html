<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Engine</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: #1e293b; line-height: 1.6; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: var(--card); padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); text-align: center; margin-bottom: 30px; }
        .setup-group { margin-bottom: 20px; }
        select, input, button { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: 600; transition: opacity 0.2s; margin-top: 10px; }
        button:hover { opacity: 0.9; }
        .hidden { display: none; }
        .option { display: block; padding: 15px; border: 2px solid #e2e8f0; margin-bottom: 10px; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .option:hover { border-color: var(--primary); background: #eff6ff; }
        .option.selected { border-color: var(--primary); background: #dbeafe; }
        .explanation { background: #f1f5f9; padding: 20px; border-radius: 8px; margin-top: 20px; border-left: 5px solid var(--primary); margin-bottom: 20px;}
        .correct { color: #16a34a; font-weight: bold; }
        .incorrect { color: #dc2626; font-weight: bold; }
        #progress { margin-bottom: 20px; font-weight: bold; color: var(--primary); font-size: 1.1em; }
        #q-text { font-size: 1.2em; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Quiz Engine</h1>
    
    <div id="setup-screen">
        <p id="loading-msg">Fetching question bank from Gist...</p>
        <div id="controls" class="hidden">
            <div class="setup-group">
                <label><strong>Select Topic:</strong></label>
                <select id="topic-select"></select>
            </div>
            <div class="setup-group">
                <label><strong>Number of Questions:</strong></label>
                <input type="number" id="q-count" value="10" min="1">
            </div>
            <button onclick="startQuiz()">Start Quiz</button>
        </div>
    </div>

    <div id="quiz-screen" class="hidden">
        <div id="progress"></div>
        <div id="question-container">
            <div id="q-text"></div>
            <div id="options-container"></div>
        </div>
        <button id="next-btn" class="hidden" onclick="nextQuestion()">Next Question</button>
    </div>

    <div id="results-screen" class="hidden">
        <h2>Quiz Complete!</h2>
        <p id="final-score" style="font-size: 1.5em; font-weight: bold;"></p>
        <hr>
        <div id="review-area"></div>
        <button onclick="location.reload()">Take Another Quiz</button>
    </div>
</div>

<script>
    let allQuestions = [];
    let activeQuestions = [];
    let currentIdx = 0;
    let userAnswers = [];

    const GIST_URL = 'https://gist.githubusercontent.com/prasannaadavi-ui/521817e7f478431c750c27bcdd93df80/raw/e74e32b42a47cd209da7a2dc4520929cdd0e3d9b/gistfile1.txt';

    async function init() {
        try {
            const response = await fetch(GIST_URL);
            const text = await response.text();
            parseMD(text);
            
            if(allQuestions.length === 0) throw new Error("No questions found");

            const topics = [...new Set(allQuestions.map(q => q.topic))];
            const select = document.getElementById('topic-select');
            select.innerHTML = '<option value="all">All Topics (Mixed)</option>' + 
                topics.map(t => `<option value="${t}">${t}</option>`).join('');
            
            document.getElementById('loading-msg').classList.add('hidden');
            document.getElementById('controls').classList.remove('hidden');
        } catch (e) {
            document.getElementById('loading-msg').innerText = "Error: Could not load questions. Check Gist format.";
            console.error(e);
        }
    }

    function parseMD(text) {
        // Split by topic headers (e.g., ## Topic Name)
        const sections = text.split(/##\s+/).filter(s => s.trim() !== "");
        
        sections.forEach(section => {
            const lines = section.split('\n');
            const topic = lines[0].trim();
            
            // Split by question markers (e.g., 1. Question Text)
            const qBlocks = section.split(/\n\d+\.\s+/).slice(1);
            
            qBlocks.forEach(block => {
                // Find
